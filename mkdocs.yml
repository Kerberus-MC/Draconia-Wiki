site_name: Draconia Wiki
site_url: https://wiki.perz.dev
repo_url: https://github.com/Kerberus-MC/Draconia-Wiki
repo_name: Kerberus-MC/Draconia-Wiki
edit_uri: edit/master/docs/

theme:
  name: material
  palette:
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.action.edit
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github
  font:
    text: Inter
    code: JetBrains Mono

markdown_extensions:
  - admonition
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html

plugins:
  - search

extra:
  social:
    - icon: fontawesome/brands/discord
      link: https://discord.gg/draconia
      name: Join our Discord
    - icon: fontawesome/brands/github
      link: https://github.com/Kerberus-MC
      name: Kerberus-MC on GitHub

extra_css:
  - stylesheets/custom.css

