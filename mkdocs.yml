site_name: Draconia Wiki
site_url: https://wiki.perz.dev
repo_url: https://github.com/Kerberus-MC/Draconia-Wiki
repo_name: Kerberus-MC/Draconia-Wiki
edit_uri: edit/master/docs/

theme:
  name: material
  palette:
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.action.edit
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github
  font:
    text: Inter
    code: JetBrains Mono

markdown_extensions:
  - admonition
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html

plugins:
  - search

extra:
  social:
    - icon: fontawesome/brands/discord
      link: https://discord.gg/draconia
      name: Join our Discord
    - icon: fontawesome/brands/github
      link: https://github.com/Kerberus-MC
      name: Kerberus-MC on GitHub

extra_css:
  - stylesheets/custom.css

nav:
  - Home: index.md
  - Dragoncraft:
    - Overview: dragoncraft/index.md
  - Toothless:
    - Overview: toothless/index.md
    - Dragons:
      - All Dragons: toothless/dragons/index.md
      - Boulder Class: toothless/dragons/boulder-class.md
      - Mystery Class: toothless/dragons/mystery-class.md
      - Sharp Class: toothless/dragons/sharp-class.md
      - Stoker Class: toothless/dragons/stoker-class.md
      - Strike Class: toothless/dragons/strike-class.md
      - Tidal Class: toothless/dragons/tidal-class.md
      - Tracker Class: toothless/dragons/tracker-class.md
    - Companions: toothless/companions.md
    - Effects: toothless/effects.md
    - Structures: toothless/structures.md
  - PvZ Overgrowth:
    - Overview: pvz-overgrowth/index.md
    - FAQ: pvz-overgrowth/faq.md
    - Guides:
      - Plant Spawn: pvz-overgrowth/plant-spawn.md
      - Contagion: pvz-overgrowth/contagion.md
    - Almanac:
      - Plants: pvz-overgrowth/almanac/plants.md
      - Zombies: pvz-overgrowth/almanac/zombies.md
      - PvZ Items: pvz-overgrowth/almanac/items.md
